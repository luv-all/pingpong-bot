# 실제 기본 런타임 설정. 필드 설명은 config/example.toml 참고.

mode = "sim"
camera_count = 3
robot = "competition"
# measure_* 기본 캘리브. 없으면 --calibration 필요.
# calibration_path = "calibration.json"

[intercept]
y_min = 0.20
y_max = 0.55
sample_step = 0.05

[sim]
gui = true
frames = 300
speed = 1.0
physics_hz = 1000.0
frame_hz = 120.0
shoot_on_start = false
use_ground_truth = true

# 검출 튜닝 SSOT (tools·런타임 공유). 카메라는 real일 때만 [[vision.cameras]].
# 런타임은 항상 fuse: generators → Scorer → MotionPrior(soft).
[vision]
generators = ["colormask"]
roi_half_px = 80

[vision.appearance.colormask]
space = "ycrcb"
y_min = 0
y_max = 255
cr_min = 133
cr_max = 173
cb_min = 77
cb_max = 127
h_min = 5
h_max = 25
s_min = 80
s_max = 255
v_min = 80
v_max = 255
min_area_px = 20.0
max_area_px = 20000.0

# no [vision.appearance.contour] fields needed for now (Canny에는 아직 TOML 튜닝 없음)

[vision.scorer]
min_area_px = 20.0
max_area_px = 20000.0
min_circularity = 0.55

[vision.motion]
# soft boost: score *= (1 + weight * overlap). 0=끔. 설명 → config/example.toml
weight = 0.5

[physics]
restitution = 0.85
friction = 0.15
drag = 0.0
