# pingpong-bot 런타임 설정 예시
#
#   cargo run -p pingpong-bin -- --config config/example.toml
#   cargo run -p pingpong-bin -- --mode sim --robot urdf-test
#
# robot = ROBOTS id (crates/app/src/arm.rs). CLI `--robot` / `--urdf`가 덮어씀.
#
# Calibration JSON은 `calib_charuco --emit-sim 3 -o calibration.json` 으로 생성.
#
# 물리 계수 측정:
#   cargo run -p measure-restitution -- --sim -o /tmp/e.toml
#   cargo run -p measure-friction -- --sim -o /tmp/mu.toml
#   cargo run -p measure-restitution -- --drag-csv traj.csv
# 측정값은 우선 `domain::constants::ball` / `physics::DEFAULT_DRAG`에 반영한다.

hit_plane_y = 0.30
camera_count = 3
robot = "competition"
# calibration_path = "calibration.json"

# [physics]  # 향후 RuntimeConfig — 지금은 주석 참고용
# restitution = 0.85
# friction = 0.15
# drag = 0.01
