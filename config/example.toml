# pingpong-bot 런타임 설정 예시
#
#   cargo run -p pingpong-bot
#   cargo run -p pingpong-bot -- config/example.toml
#   cp config/example.toml config/experiment.toml
#
# 상대 경로는 이 TOML 위치 기준.

# "sim" | "real"
mode = "sim"

# 삼각측량 최소 2대.
camera_count = 3

robot = "competition"

# 보정 JSON 하나 = 안에 cameras[] (캠마다 K·dist).
# measure_* / calib 는 이 경로를 기본으로 쓴다 (--calibration / -o 로 덮어쓰기).
#   cargo run -p calib-charuco -- --device 0
#   cargo run -p measure-restitution -- --device 0 --device 1
calibration_path = "calibration.json"

# urdf_path = "../assets/robots/custom/robot.urdf"
# ee_link = "racket_link"

[intercept]
y_min = 0.20
y_max = 0.55
sample_step = 0.05

[sim]
gui = true
frames = 300
speed = 1.0
physics_hz = 1000.0
frame_hz = 120.0
shoot_on_start = false
# true=ground truth / false=EKF control
use_ground_truth = true

# real 모터 — config/real-hardware.toml 참고
# [hardware.dynamixel]
# port = "COM8"
# motor_ids = [1, 3, 4, 5]
# joint_signs = [-1, 1, 1, 1]
# joint_offsets_rad = [0.0, 0.0, 0.0, 0.0]
# motor_angle_limits_deg = [[90, 220], [135, 225], [92, 230], [120, 220]]

# real + calibration_path 일 때 실캠 (device = 웹캠 번호).
#
# [vision]
# detector = "colormask"   # bgsub | colormask | contour | roi
#
# [[vision.cameras]]
# id = 0
# device = 0
#
# [[vision.cameras]]
# id = 1
# device = 1
#
# [vision.colormask]
# space = "ycrcb"
# y_min = 0
# y_max = 255
# cr_min = 133
# cr_max = 173
# cb_min = 77
# cb_max = 127
# min_area_px = 20
# max_area_px = 20000

[physics]
restitution = 0.85
friction = 0.15
drag = 0.0
