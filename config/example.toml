# pingpong-bot 런타임 설정 예시
#
#   cargo run -p pingpong-bot
#   cargo run -p pingpong-bot -- config/example.toml
#   cp config/example.toml config/experiment.toml
#
# 상대 경로는 이 TOML 위치 기준.

# "sim" | "real"
mode = "sim"

# 삼각측량 최소 2대.
camera_count = 3

robot = "competition"

# 보정 JSON 하나 = 안에 cameras[] (캠마다 K·dist).
# measure_* / calib 는 이 경로를 기본으로 쓴다 (--calibration / -o 로 덮어쓰기).
#   cargo run -p calib-charuco -- --device 0
#   cargo run -p measure-restitution -- --device 0 --device 1
calibration_path = "calibration.json"

# urdf_path = "../assets/robots/custom/robot.urdf"
# ee_link = "racket_link"

[intercept]
y_min = 0.20
y_max = 0.55
sample_step = 0.05

[sim]
gui = true
frames = 300
speed = 1.0
physics_hz = 1000.0
frame_hz = 120.0
shoot_on_start = false
# true=ground truth / false=EKF control
use_ground_truth = true

# real 모터 — config/real-hardware.toml 참고
# [hardware.dynamixel]
# port = "COM8"
# motor_ids = [1, 3, 4, 5]
# joint_signs = [-1, 1, 1, 1]
# joint_offsets_rad = [0.0, 0.0, 0.0, 0.0]
# motor_angle_limits_deg = [[90, 220], [135, 225], [92, 230], [120, 220]]

# real AXL 레일 — config/real-hardware.toml 참고
# [hardware.rail]
# enabled = false
# dll_path = "C:/path/to/AXL.dll"
# axis = 0
# irq_no = 7
# pulses_per_meter = 2500000
# x_min_m = -0.20
# x_max_m = 0.50
# vel = 0.3
# accel = 1.0
# decel = 1.0
# min_vel = 0.001
# max_vel = 1.0
# pulse_out_method = 4
# enc_input_method = 3
# abs_rel_mode = 0
# profile_mode = 3
# accel_unit = 0
# soft_limit_stop_mode = 0
# soft_limit_selection = 0
# inposition_use = 1
# alarm_use = 0
# limit_stop_mode = 0
# pos_end_limit_level = 2
# neg_end_limit_level = 2

# ─── 검출 ([vision]) ───────────────────────────────────────────────
# 런타임·detect-* 툴 공용 SSOT. 이 블록을 빼면 `config/default.toml` 임베드값.
#
# 파이프라인 (항상 fuse, peer detector 없음):
#   1. appearance  generators — 후보 생성 (colormask | contour, 앞부터 FirstSurviving)
#   2. scorer                 — area·원형도 hard cut + (있으면) motion soft
#   3. motion                 — 프레임 차분 마스크; soft boost만 (독립 검출기 아님)
#   ROI                       — track() 반변; detect-full 에서 `r` 로 on/off
#
# 실험:
#   cargo run -p detect-appearance   # colormask | contour 좌우
#   cargo run -p detect-full         # fuse 본선 + ROI 토글
#
# [vision]
# generators = ["colormask"]   # 또는 ["colormask","contour"] / ["contour"]
# roi_half_px = 80             # 직전 hit 기준 정사각 ROI 반변 [px]
#
# [[vision.cameras]]           # real 전용. 비어 있으면 모터 스모크만
# id = 0
# device = 0
#
# [[vision.cameras]]
# id = 1
# device = 1
#
# # ── appearance: 색 마스크 (space=ycrcb | hsv; 미사용 채널 범위는 무시)
# [vision.appearance.colormask]
# space = "ycrcb"
# y_min = 0
# y_max = 255
# cr_min = 133
# cr_max = 173
# cb_min = 77
# cb_max = 127
# h_min = 5
# h_max = 25
# s_min = 80
# s_max = 255
# v_min = 80
# v_max = 255
# min_area_px = 20.0           # generator 쪽 거친 면적 필터 (scorer와 교집합)
# max_area_px = 20000.0
#
# # contour appearance 는 Canny 고정 — TOML 튜닝 키 없음 (필터는 scorer 공유)
#
# # ── scorer: hard cut (통과 못하면 탈락)
# [vision.scorer]
# min_area_px = 20.0
# max_area_px = 20000.0
# min_circularity = 0.55       # 0..=1, 원에 가까울수록 1
#
# # ── motion: soft boost only
# # 점수 *= (1 + weight * overlap). overlap = 후보 bbox 안 움직임 픽셀 비율 [0,1]
# # weight = 0 → MotionPrior 끔. 키울수록 “움직이는 blob” 선호.
# [vision.motion]
# weight = 0.5

[physics]
restitution = 0.85
friction = 0.15
drag = 0.0
