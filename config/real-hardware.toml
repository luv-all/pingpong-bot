# Windows Dynamixel 4-DOF 연결·조그용 설정.
# 먼저 `jog_axis ... --dry-run`, 이후 작은 단축 이동으로 검증한다.

mode = "real"
camera_count = 3
robot = "competition"
urdf_path = "../assets/robots/4-dof/urdf/all-4-export.urdf"
ee_link = "pingpong_paddle_v5_1"

[intercept]
y_min = 0.20
y_max = 0.55
sample_step = 0.05

# RuntimeConfig 공통 필드. real 하드웨어 스모크에서는 사용하지 않는다.
[sim]
gui = false
frames = 0
speed = 1.0
physics_hz = 1000.0
frame_hz = 120.0
shoot_on_start = false
use_ground_truth = false

[hardware.dynamixel]
port = "COM8"
baudrate = 57600
protocol_version = 2.0
motor_ids = [1, 3, 4, 5]
ticks_per_revolution = 4096
zero_tick = 2048
addr_goal_position = 116
addr_torque_enable = 64
addr_present_position = 132
addr_profile_acceleration = 108
addr_profile_velocity = 112
profile_acceleration = 20
profile_velocity = 80
comm_retries = 5
comm_retry_delay_ms = 20
stream_hz = 200.0
joint_signs = [-1, 1, 1, 1]
joint_offsets_rad = [0.0, 0.0, 0.0, 0.0]
motor_angle_limits_deg = [
  [90.0, 220.0],
  [135.0, 225.0],
  [92.0, 230.0],
  [120.0, 220.0],
]

[physics]
restitution = 0.85
friction = 0.15
drag = 0.0

[hardware.rail]
enabled = true
dll_path = "C:/Users/user/Downloads/Interfacing File/Interfacing File/Linear/LM_interface/src/lib/AXL.dll"
axis = 0
irq_no = 7
# 벤치에서 1 m당 펄스 실측 후 기입. 아래는 자리값.
pulses_per_meter = 250000
x_min_m = 0
x_max_m = 1.43
vel = 0.8
accel = 1.0
decel = 1.0
min_vel = 0.001
max_vel = 1.0
pulse_out_method = 4
enc_input_method = 3
abs_rel_mode = 0
profile_mode = 3
accel_unit = 0
soft_limit_stop_mode = 0
soft_limit_selection = 0
inposition_use = 1
alarm_use = 0
limit_stop_mode = 0
pos_end_limit_level = 2
neg_end_limit_level = 2
