[package]
name = "pingpong-bin"
edition.workspace = true
version.workspace = true

[[bin]]
name = "pingpong-bot"
path = "src/main.rs"

[dependencies]
anyhow = "1.0.103"
clap = { version = "4.6.1", features = ["derive"] }
pingpong-app = { version = "0.1.0", path = "../app" }
pingpong-domain = { version = "0.1.0", path = "../domain" }
pingpong-infra = { version = "0.1.0", path = "../infra", features = ["gui"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
